name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      npm_tag: ${{ steps.version.outputs.npm_tag }}
      changelog: ${{ steps.changelog.outputs.body }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

          if [[ "$TAG" == *-alpha.* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "npm_tag=alpha" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == *-beta.* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "npm_tag=beta" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == *-rc.* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "npm_tag=rc" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify package.json version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag (v$TAG_VERSION)"
            exit 1
          fi

      - name: Verify SDK_VERSION matches tag
        run: |
          node -e "
            const fs = require('fs');
            const content = fs.readFileSync('src/version.ts', 'utf8');
            const match = content.match(/SDK_VERSION = '([^']+)'/);
            if (!match || match[1] !== '${{ steps.version.outputs.version }}') {
              console.error('SDK_VERSION in src/version.ts does not match tag');
              process.exit(1);
            }
            console.log('SDK_VERSION matches: ' + match[1]);
          "

      - name: Extract CHANGELOG entry
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
            const regex = new RegExp('## \\\\[' + VERSION.replace(/\\./g, '\\\\.') + '\\\\].*?\\n([\\s\\S]*?)(?=\\n## \\\\[|$)');
            const match = changelog.match(regex);
            if (!match) {
              console.error('No CHANGELOG entry found for version ' + VERSION);
              process.exit(1);
            }
            const body = match[1].trim();
            fs.writeFileSync('/tmp/changelog-body.txt', body);
            console.log('Found CHANGELOG entry (' + body.split('\\n').length + ' lines)');
          "
          {
            echo 'body<<CHANGELOG_EOF'
            cat /tmp/changelog-body.txt
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

  ci:
    name: CI Checks
    needs: validate
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish to npm
    needs: [validate, ci]
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build artifacts
        run: |
          test -f dist/index.js || { echo "::error::ESM build missing"; exit 1; }
          test -f dist/index.cjs || { echo "::error::CJS build missing"; exit 1; }
          test -f dist/index.d.ts || { echo "::error::ESM types missing"; exit 1; }
          test -f dist/index.d.cts || { echo "::error::CJS types missing"; exit 1; }

      - name: Generate SBOM
        run: npx @cyclonedx/cyclonedx-npm --output-file sbom.json --output-format json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          retention-days: 90

      - name: Dry-run publish
        run: npm publish --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm with provenance
        run: npm publish --provenance --tag ${{ needs.validate.outputs.npm_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify publication
        run: |
          sleep 10
          npm view kubemq-js@${{ needs.validate.outputs.version }} version

  github-release:
    name: Create GitHub Release
    needs: [validate, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: v${{ needs.validate.outputs.version }}
          body: ${{ needs.validate.outputs.changelog }}
          prerelease: ${{ needs.validate.outputs.prerelease == 'true' }}
          generate_release_notes: false
