name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: ESLint
        run: npx eslint .

      - name: Prettier check
        run: npx prettier --check "src/**/*.ts" "__tests__/**/*.ts"

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Type check examples
        run: npx tsc --noEmit -p examples/tsconfig.json

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Verify package contents
        run: npm pack --dry-run

  unit-tests:
    name: Unit Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Run unit tests
        run: npx vitest run --config vitest.config.ts

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run tests with coverage
        run: npx vitest run --config vitest.config.ts --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      kubemq:
        image: kubemq/kubemq:latest
        ports:
          - 50000:50000
          - 8080:8080
          - 9090:9090
        env:
          KUBEMQ_TOKEN: ''
        options: >-
          --health-cmd "wget -q --spider http://localhost:8080/health || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Wait for KubeMQ to be healthy
        run: |
          for i in $(seq 1 30); do
            if wget -q --spider http://localhost:8080/health 2>/dev/null; then
              echo "KubeMQ is ready"
              exit 0
            fi
            echo "Waiting for KubeMQ... ($i/30)"
            sleep 2
          done
          echo "KubeMQ failed to start"
          exit 1

      - name: Run integration tests
        env:
          KUBEMQ_ADDRESS: localhost:50000
        run: npx vitest run --config vitest.integration.config.ts

      - name: Smoke-test examples
        run: |
          timeout 30 npx tsx examples/connection/connect.ts || true
          timeout 30 npx tsx examples/connection/ping.ts || true

  docs:
    name: API Docs
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build TypeDoc API reference
        run: npm run docs

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: docs/api/
          retention-days: 14

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high
